<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0f">
<title>Trainee</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
:root{
  --bg:#0A0E0F;
  --bg2:#10171A;
  --card:#161E21;
  --card2:#1E282B;
  --card3:#131B1E;
  --border:#26333700;
  --border-v:#263337;
  --text:#ffffff;
  --text2:#aab3b6;
  --text3:#6b7679;
  --muted:#4d5659;
  --red:#E01E2B;
  --red2:#FF3D48;
  --red-dark:#a8121c;
  --red-glow:rgba(224,30,43,.4);
  --green:#22C55E;
  --gold:#F5C518;
  --tab-h:84px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.22,.61,.36,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0}
input,select,button,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

.shell{max-width:480px;margin:0 auto;min-height:100vh;position:relative;display:flex;flex-direction:column}
.scroll-area{flex:1;overflow-y:auto;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 8px);-webkit-overflow-scrolling:touch}

/* ── TOP BAR (hamburger + logo central) ── */
.topbar{padding:calc(14px + var(--safe-t)) 18px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:30}
.burger{width:30px;height:24px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;flex-shrink:0}
.burger span{height:3px;border-radius:2px;background:var(--red);width:100%}
.burger span:nth-child(2){width:70%}
.logo-wrap{display:flex;align-items:center;gap:3px;font-weight:900;font-size:1.5rem;letter-spacing:-1px}
.logo-bars{display:flex;gap:2px}
.logo-bar{width:4px;height:20px;background:var(--red);border-radius:2px}
.logo-bar:nth-child(2){height:26px}
.logo-t{color:#fff;font-style:italic;margin:0 2px}
.topbar-spacer{width:30px}

/* ── BIG TABS with underline ── */
.bigtabs{display:flex;overflow-x:auto;background:var(--bg2);scrollbar-width:none;border-bottom:1px solid var(--border)}
.bigtabs::-webkit-scrollbar{display:none}
.bigtab{flex:1;min-width:max-content;padding:16px 20px;text-align:center;font-size:1.05rem;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:.2s var(--ease);white-space:nowrap}
.bigtab.active{color:#fff;border-bottom-color:var(--red)}

/* ── TOGGLE (Fichas Criadas / Baixadas) ── */
.toggle-pill{display:grid;grid-template-columns:1fr 1fr;background:var(--card);border-radius:14px;margin:16px;overflow:hidden}
.toggle-pill-btn{padding:16px;text-align:center;font-size:1.05rem;font-weight:600;cursor:pointer;color:var(--text);transition:.2s}
.toggle-pill-btn.active{background:#f5f5f7;color:#111;border-radius:14px;font-weight:700}

/* ── BOTTOM TAB BAR ── */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;z-index:40;padding-top:12px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s var(--spring);padding-top:8px}
.tab:active{transform:scale(.9)}
.tab-lbl{font-size:1rem;font-weight:600;color:var(--text3);transition:color .2s;position:relative;padding-bottom:6px}
.tab.active .tab-lbl{color:#fff;font-weight:700}
.tab.active .tab-lbl::after{content:'';position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:22px;height:3px;border-radius:2px;background:var(--red)}

.page{animation:fadeUp .3s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── BIG GREY CARD (Treinos da semana / meta) ── */
.panel{margin:6px 16px 16px;background:var(--card);border-radius:18px;overflow:hidden}
.panel-title{text-align:center;font-size:1.35rem;font-weight:800;padding:18px;letter-spacing:-.3px}
.panel-divider{height:1px;background:var(--border);margin:0}
.panel-section{padding:20px 18px}
.week-circles{display:flex;justify-content:space-between;gap:4px}
.wc{display:flex;flex-direction:column;align-items:center;gap:10px}
.wc-lbl{font-size:.92rem;color:var(--text);font-weight:600}
.wc-circle{width:46px;height:46px;border-radius:50%;border:3px solid var(--text2);background:transparent;display:flex;align-items:center;justify-content:center;transition:.2s var(--spring);cursor:pointer}
.wc.today .wc-circle{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
.wc.done .wc-circle{background:var(--red);border-color:var(--red);color:#fff;font-size:1.2rem}
.kcal-bar-track{background:var(--card3);border-radius:99px;height:14px;overflow:hidden}
.kcal-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),var(--red2));transition:width .7s var(--ease)}
.panel-links{display:flex}
.panel-link{flex:1;text-align:center;padding:20px;font-size:1.05rem;font-weight:700;color:var(--red2);cursor:pointer;letter-spacing:.3px;text-transform:uppercase}

/* ── SECTION HEADING ── */
.heading{font-size:1.7rem;font-weight:800;padding:14px 16px 10px;letter-spacing:-.5px}
.filter-row{display:flex;align-items:center;gap:10px;padding:0 16px 14px}
.filter-row .fl-label{font-size:1.1rem;font-weight:700;color:var(--text)}
.filter-tag{background:var(--card);border:none;padding:10px 20px;border-radius:99px;font-size:.95rem;font-weight:600;color:var(--text);cursor:pointer}

/* ── FICHA CARDS (with photo) ── */
.ficha-grid{display:flex;gap:12px;overflow-x:auto;padding:0 16px 14px;scrollbar-width:none}
.ficha-grid::-webkit-scrollbar{display:none}
.ficha-card{flex-shrink:0;width:calc(50% - 22px);min-width:160px;border-radius:16px;overflow:hidden;position:relative;height:200px;cursor:pointer;background:var(--card);border:1px solid var(--border)}
.ficha-card .fc-photo{position:absolute;inset:0;background-size:cover;background-position:center}
.ficha-card .fc-grad{position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,45,58,.25),transparent 45%),linear-gradient(0deg,rgba(0,0,0,.9),transparent 55%)}
.ficha-card .fc-art{position:absolute;right:8px;top:8px;font-size:3.5rem;opacity:.18}
.ficha-card .fc-body{position:absolute;bottom:0;left:0;right:0;padding:14px;z-index:2}
.ficha-card .fc-name{font-size:1.05rem;font-weight:800;line-height:1.1}
.ficha-card .fc-meta{font-size:.72rem;color:var(--text2);margin-top:4px}

/* ── FLOATING INICIAR ── */
.iniciar-float{position:sticky;bottom:calc(var(--tab-h) + var(--safe-b) + 10px);margin:18px 16px 0;z-index:10}
.iniciar-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:99px;padding:20px;font-size:1.2rem;font-weight:800;cursor:pointer;letter-spacing:.5px;box-shadow:0 8px 28px var(--red-glow);transition:transform .12s var(--spring),filter .2s}
.iniciar-btn:active{transform:scale(.97)}
.iniciar-btn:hover{filter:brightness(1.05)}

/* ── DETALHAMENTO (header colapsável) ── */
.detail-header{margin:16px;background:var(--card);border-radius:16px;padding:22px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.detail-header .dh-name{font-size:1.25rem;font-weight:800;flex:1;text-align:center}
.detail-header .dh-chevron{font-size:1.3rem;color:var(--text);transition:transform .3s var(--spring)}
.detail-header.open .dh-chevron{transform:rotate(180deg)}
.detail-expand{margin:0 16px;background:var(--card);border-radius:0 0 16px 16px;margin-top:-16px;padding:0 22px 22px;display:none}
.detail-header.open+.detail-expand{display:block}
.detail-tags{display:flex;gap:10px;justify-content:center;padding-top:18px;flex-wrap:wrap}
.dtag{background:var(--red);color:#fff;padding:9px 22px;border-radius:99px;font-size:.95rem;font-weight:700}
.detail-info-title{text-align:center;font-weight:800;font-size:1.1rem;margin-top:20px}
.detail-info-text{text-align:center;color:var(--text2);font-size:.95rem;line-height:1.5;margin-top:8px}

.copy-ficha-btn{width:calc(100% - 32px);margin:18px 16px 0;background:var(--red);color:#fff;border:none;border-radius:99px;padding:18px;font-size:1.15rem;font-weight:700;cursor:pointer;box-shadow:0 6px 22px var(--red-glow);transition:transform .12s var(--spring)}
.copy-ficha-btn:active{transform:scale(.97)}

.select-prompt{font-size:1.3rem;font-weight:800;padding:20px 16px 14px;letter-spacing:-.3px}

/* ── TREINO A-E cards (vermelho sólido) ── */
.treino-cards{padding:0 16px;display:flex;flex-direction:column;gap:14px}
.treino-card{background:var(--red);border-radius:16px;overflow:hidden;box-shadow:0 6px 20px var(--red-glow)}
.tc-header{padding:20px 22px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.tc-header .tc-title{font-size:1.25rem;font-weight:800;color:#fff;flex:1;text-align:center}
.tc-header .tc-chevron{font-size:1.2rem;color:#fff;transition:transform .3s var(--spring)}
.treino-card.open .tc-chevron{transform:rotate(180deg)}
.tc-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s var(--ease)}
.treino-card.open .tc-body{grid-template-rows:1fr}
.tc-body>div{min-height:0;overflow:hidden}
.tc-body-inner{padding:0 18px 18px}
.tc-divider{height:2px;background:rgba(255,255,255,.25);margin:0 4px 16px}
.tc-stats{display:flex;gap:12px;margin-bottom:16px}
.tc-stat{flex:1;border:1.5px solid rgba(255,255,255,.4);border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px}
.tc-stat .tcs-ico{font-size:1.6rem}
.tc-stat .tcs-val{font-size:1.05rem;font-weight:800;color:#fff;line-height:1.1}
.tc-stat .tcs-lbl{font-size:.72rem;color:rgba(255,255,255,.8);margin-top:2px}
.tc-detail-btn{width:100%;background:#fff;color:var(--red);border:none;border-radius:99px;padding:16px;font-size:1.05rem;font-weight:800;cursor:pointer;margin-bottom:16px;transition:transform .12s var(--spring)}
.tc-detail-btn:active{transform:scale(.97)}
.tc-exlist-box{border:1.5px solid rgba(255,255,255,.4);border-radius:12px;overflow:hidden}
.tc-exlist-title{padding:14px 16px;font-size:1.05rem;font-weight:800;color:#fff;border-bottom:1.5px solid rgba(255,255,255,.3)}
.tc-ex-item{padding:14px 16px;font-size:1rem;color:#fff;border-bottom:1px solid rgba(255,255,255,.18)}
.tc-ex-item:last-child{border-bottom:none}
.tc-actions{display:flex;gap:8px;margin-top:14px}
.tc-mini-btn{flex:1;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:99px;padding:12px;font-size:.9rem;font-weight:700;cursor:pointer}
.tc-mini-btn.danger{background:rgba(0,0,0,.25)}

/* ── EXERCÍCIOS PAGE ── */
.search-box{margin:16px;background:var(--card);border-radius:14px;display:flex;align-items:center;gap:12px;padding:18px 20px}
.search-box input{flex:1;background:none;border:none;color:var(--text);font-size:1.1rem;outline:none}
.search-box input::placeholder{color:var(--text3)}
.search-box .si{font-size:1.4rem;color:var(--text3)}
.cat-chips{display:flex;gap:10px;overflow-x:auto;padding:0 16px 14px;scrollbar-width:none}
.cat-chips::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:12px 24px;border-radius:99px;font-size:1.05rem;font-weight:600;cursor:pointer;background:var(--card);color:var(--text);transition:.15s;white-space:nowrap}
.cat-chip.active{background:#f5f5f7;color:#111;font-weight:700}
.ex-list-full{padding:0 16px}

/* ── BIBLIOTECA CLEAN + SPLIT ── */
.lib-split{display:flex;gap:0;transition:.3s var(--ease)}
.lib-col-list{flex:1;padding:0 16px;transition:.3s var(--ease);min-width:0}
.lib-split.has-detail .lib-col-list{flex:0 0 38%;padding:0 8px 0 16px;border-right:1px solid var(--border)}
.lib-ex-row{padding:16px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.lib-ex-row:active{opacity:.6}
.lib-ex-row.active{border-bottom-color:transparent}
.lib-ex-name{font-weight:700;font-size:1.05rem;line-height:1.25}
.lib-split.has-detail .lib-ex-name{font-size:.88rem;font-weight:600}
.lib-ex-row.active .lib-ex-name{color:var(--red2)}
.lib-ex-muscle{font-size:.78rem;color:var(--text3);margin-top:4px}
.lib-col-detail{flex:1;padding:0 16px 0 14px;animation:detailIn .35s var(--ease) both;min-width:0}
@keyframes detailIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
.lib-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.lib-detail-name{font-size:1.15rem;font-weight:800;line-height:1.2}
.lib-detail-close{width:28px;height:28px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;flex-shrink:0;font-size:.85rem}
.lib-detail-tag{display:inline-block;background:rgba(255,45,58,.16);color:var(--red2);padding:4px 12px;border-radius:99px;font-size:.74rem;font-weight:700;margin-top:8px}
.lib-body-viewer{margin:14px 0;background:linear-gradient(160deg,#202024,#141417);border-radius:16px;padding:12px;display:flex;flex-direction:column;align-items:center}
.lib-body-rotator{width:100%;display:flex;justify-content:center;transition:opacity .15s;min-height:180px;align-items:center}
.lib-3d-wrap{position:relative;width:100%;height:280px;border-radius:12px;overflow:hidden;background:radial-gradient(ellipse at 50% 40%,#2a2a30,#161619)}
.lib-3d{width:100%;height:100%;background:transparent;--poster-color:transparent}
.lib-3d-status{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none;padding:24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,#2a2a30,#161619)}
.m3d-spin{width:34px;height:34px;border:3px solid var(--card);border-top-color:var(--red);border-radius:50%;animation:m3dspin .8s linear infinite}
@keyframes m3dspin{to{transform:rotate(360deg)}}
.m3d-msg{font-size:.86rem;color:var(--text2);line-height:1.5}
.anat-svg{width:100%;max-width:140px;height:auto;display:block}
.anat-body{fill:#2a2a30;stroke:#3c3c44;stroke-width:.6}
.anat-shade{fill:url(#anatShade);stroke:none;pointer-events:none}
.anat-m{fill:#3a3a42;stroke:#4a4a54;stroke-width:.6;transition:fill .4s var(--ease)}
.anat-m.on{fill:var(--red);stroke:var(--red2);stroke-width:1;filter:drop-shadow(0 0 6px var(--red-glow))}
.lib-view-tabs{display:flex;gap:6px;margin-top:8px}
.lvt{padding:7px 14px;border-radius:99px;font-size:.76rem;font-weight:700;cursor:pointer;background:var(--card);color:var(--text2);transition:.15s}
.lvt.active{background:var(--red);color:#fff}
.lib-detail-info{margin-top:6px}
.ldi-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--red2);margin-top:14px;margin-bottom:5px}
.ldi-text{font-size:.86rem;color:var(--text2);line-height:1.5}
.ex-row{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ex-row:active{opacity:.7}
.ex-thumb{width:70px;height:70px;border-radius:14px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;overflow:hidden}
.ex-thumb .vid-soon{font-size:.6rem;color:var(--red2);text-align:center;font-weight:700;line-height:1.2}
.ex-row-name{font-weight:800;font-size:1.15rem;line-height:1.2}

/* ── DIETA ── */
.diet-cal{padding:8px 16px 0;display:flex;justify-content:space-between;gap:4px}
.dc-day{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.dc-lbl{font-size:.92rem;color:var(--text3);font-weight:600}
.dc-num{width:48px;height:48px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:600;color:var(--text);transition:.2s var(--spring)}
.dc-day.today .dc-num{background:var(--red);color:#fff;box-shadow:0 4px 14px var(--red-glow)}
.dc-day.today .dc-lbl{color:var(--text)}
.today-row{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 12px}
.today-row .tr-title{font-size:1.9rem;font-weight:800;display:flex;align-items:center;gap:10px}
.today-row .tr-edit{font-size:1.15rem;color:var(--red2);font-weight:600;cursor:pointer}
.diet-meta-card{margin:0 16px;background:var(--card);border-radius:18px;padding:22px}
.dmc-top{display:flex;justify-content:space-between;align-items:flex-start}
.dmc-meta-title{font-size:1.5rem;font-weight:700}
.dmc-meta-sub{font-size:1rem;color:var(--text3);margin-top:2px}
.dmc-remaining{text-align:right}
.dmc-rem-num{font-size:2.4rem;font-weight:400;line-height:1}
.dmc-rem-lbl{font-size:1rem;color:var(--text3)}
.dmc-consumed{margin-top:18px}
.dmc-consumed .dmc-meta-title{font-size:1.5rem}
.dmc-macros{display:flex;gap:18px;margin-top:24px}
.dmc-macro{flex:1}
.dmc-macro-name{font-size:1.05rem;color:var(--text);margin-bottom:8px}
.dmc-macro-track{background:var(--card3);border-radius:99px;height:5px;overflow:hidden;margin-bottom:8px}
.dmc-macro-fill{height:100%;border-radius:99px;transition:width .7s var(--ease)}
.dmc-macro-val{font-size:.95rem;color:var(--text3)}
.dmc-macro-val b{color:var(--text);font-weight:700}
.diet-sec-head{display:flex;align-items:center;justify-content:space-between;padding:24px 16px 4px}
.diet-sec-head h3{font-size:1.7rem;font-weight:800}
.diet-sec-head .dots{font-size:1.5rem;color:var(--red2);cursor:pointer;letter-spacing:2px}
.meal-block{margin:10px 16px;background:var(--card);border-radius:16px;overflow:hidden}
.meal-block-hdr{padding:18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.mbh-name{font-size:1.35rem;font-weight:700}
.mbh-sub{font-size:.95rem;color:var(--text3);margin-top:4px}
.meal-add-circle{width:48px;height:48px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:1.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px var(--red-glow);transition:transform .15s var(--spring)}
.meal-add-circle:active{transform:scale(.88)}
.meal-block-macros{display:flex;justify-content:space-between;padding:0 18px 18px;gap:8px}
.mbm{font-size:.95rem;color:var(--text)}
.mbm b{color:var(--red2);font-weight:700}
.meal-foods{padding:0 18px 14px;display:none}
.meal-block.open .meal-foods{display:block}
.food-line{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--border)}
.fl-name{font-size:1rem;font-weight:700}
.fl-qty{font-size:.85rem;color:var(--text3);margin-top:2px}
.fl-kcal{font-size:1rem;font-weight:700;color:var(--red2)}
.diet-model-btns{padding:8px 16px}
.dm-btn{width:100%;background:var(--card);border:none;border-radius:14px;padding:20px;font-size:1.2rem;font-weight:700;color:#fff;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:12px;transition:transform .12s var(--spring)}
.dm-btn:active{transform:scale(.98)}
.dm-btn .dm-ico{color:var(--red2);font-size:1.4rem}
.habit-block{margin:10px 16px;background:var(--card);border-radius:16px;padding:18px}
.habit-block .hb-name{font-size:1.25rem;font-weight:600;margin-bottom:14px}
.habit-block .hb-row{display:flex;align-items:center;gap:14px}
.hb-track{flex:1;background:var(--bg);border-radius:99px;height:14px;overflow:hidden}
.hb-fill{height:100%;border-radius:99px;background:var(--red);transition:width .7s var(--ease)}
.hb-add{width:52px;height:52px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px var(--red-glow);transition:transform .15s var(--spring)}
.hb-add:active{transform:scale(.88)}

/* ── PERFIL ── */
.profile-card{margin:16px;background:var(--card);border-radius:18px;padding:20px;position:relative}
.profile-top{display:flex;align-items:center;gap:0;position:relative;min-height:90px}
.profile-pic{width:90px;height:90px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:2.4rem;color:var(--text2);position:absolute;top:-30px;left:0;border:4px solid var(--card)}
.profile-edit-link{position:absolute;top:0;right:0;color:var(--red2);font-size:1.1rem;font-weight:600;cursor:pointer;text-decoration:underline}
.profile-name-big{font-size:1.8rem;font-weight:800;margin-top:48px;letter-spacing:-.5px}
.profile-divider{height:1px;background:var(--border);margin:16px 0}
.profile-obj-row{display:flex;align-items:center;justify-content:space-between}
.profile-obj-lbl{font-size:1.3rem;color:var(--text3)}
.profile-obj-val{font-size:1.3rem;font-weight:600}
.body-section-title{font-size:1.9rem;font-weight:800;padding:18px 16px 12px}
.body-feat{margin:0 16px 16px;background:var(--card);border-radius:18px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:transform .12s var(--spring)}
.body-feat:active{transform:scale(.98)}
.body-feat-text{flex:1}
.body-feat-text .bft-title{font-size:1.35rem;font-weight:700}
.body-feat-text .bft-sub{font-size:1.05rem;color:var(--text3);margin-top:8px;line-height:1.4}
.body-feat-text .bft-link{font-size:1.1rem;color:var(--red2);font-weight:600;margin-top:14px;display:flex;align-items:center;gap:8px}
.body-feat-img{width:110px;height:110px;border-radius:14px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:16px;overflow:hidden;margin:0 16px 16px}
.ps-cell{background:var(--card);padding:18px 8px;text-align:center}
.ps-v{font-size:1.7rem;font-weight:800}
.ps-v.r{color:var(--red2)}.ps-v.g{color:var(--green)}
.ps-k{font-size:.72rem;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}

/* ── DRAWER ── */
.drawer-scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;height:100%;width:320px;max-width:84%;background:var(--bg);z-index:70;transform:translateX(-105%);transition:transform .35s var(--ease);padding:calc(40px + var(--safe-t)) 0 calc(24px + var(--safe-b));display:flex;flex-direction:column;box-shadow:20px 0 60px rgba(0,0,0,.6)}
.drawer.show{transform:translateX(0)}
.drawer-profile{display:flex;align-items:center;gap:16px;padding:0 24px 32px}
.drawer-pic{width:64px;height:64px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:var(--text2)}
.drawer-name{font-size:1.4rem;font-weight:800}
.drawer-item{display:flex;align-items:center;gap:18px;padding:18px 24px;cursor:pointer;transition:background .15s}
.drawer-item:active{background:var(--card3)}
.drawer-item .di-ico{font-size:1.5rem;width:28px;text-align:center}
.drawer-item .di-label{flex:1;font-size:1.2rem;font-weight:500}
.drawer-item .di-arrow{color:var(--red2);font-size:1.2rem}
.drawer-footer{margin-top:auto;padding:0 24px}
.drawer-logout{width:100%;background:transparent;border:1.5px solid var(--red);color:var(--red2);border-radius:14px;padding:16px;font-size:1.1rem;font-weight:700;cursor:pointer}
.drawer-version{text-align:center;color:var(--muted);font-size:.85rem;margin-top:16px}

/* ── EXERCISE CARD (treino atual workout) ── */
.wk-hero{margin:8px 16px 0;background:var(--card);border-radius:16px;overflow:hidden;min-height:160px;position:relative;display:flex;flex-direction:column;justify-content:flex-end}
.wh-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.35}
.wh-grad{position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,45,58,.18),transparent 50%),linear-gradient(0deg,rgba(0,0,0,.85),transparent 60%)}
.wh-art{position:absolute;right:10px;top:10px;font-size:4.5rem;opacity:.12}
.wh-body{position:relative;z-index:2;padding:16px}
.wh-eyebrow{font-size:.7rem;color:var(--red2);font-weight:800;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:4px}
.wh-title{font-size:1.6rem;font-weight:900;letter-spacing:-.5px}
.wh-meta{display:flex;gap:14px;margin-top:6px}
.wh-meta span{font-size:.8rem;color:rgba(255,255,255,.7)}
.wh-meta b{color:#fff}
.wh-photo-btn{position:absolute;top:12px;right:12px;z-index:3;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:99px;padding:6px 12px;font-size:.72rem;font-weight:600;cursor:pointer}
.trio{display:grid;grid-template-columns:repeat(3,1fr);background:var(--card);border-radius:16px;overflow:hidden;margin:12px 16px 0}
.trio-cell{padding:14px 6px;text-align:center;position:relative}
.trio-cell+.trio-cell::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:1px;background:var(--border)}
.trio-v{font-size:1.4rem;font-weight:900;letter-spacing:-.4px}
.trio-v.r{color:var(--red2)}.trio-v.g{color:var(--green)}.trio-v.gold{color:var(--gold)}
.trio-k{font-size:.6rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.body-card{margin:12px 16px 0;background:var(--card);border-radius:16px;padding:18px}
.body-card-title{font-size:1.05rem;font-weight:800;margin-bottom:14px}
.body-card-title span{color:var(--red2)}
.body-pair{display:flex;gap:8px;justify-content:center}
.body-panel{display:flex;flex-direction:column;align-items:center;gap:5px;max-width:130px;flex:1}
.body-panel .bp-lbl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.m{fill:var(--card3);stroke:var(--card);stroke-width:1.2;transition:fill .4s var(--ease)}
.m.on{fill:var(--red);filter:drop-shadow(0 0 4px var(--red-glow))}
.body-outline-path{fill:var(--bg2);stroke:var(--card);stroke-width:1.5}
.muscle-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.m-tag{background:rgba(255,45,58,.16);color:var(--red2);padding:5px 13px;border-radius:99px;font-size:.82rem;font-weight:700}
.ex-cards{margin:14px 16px 0;display:flex;flex-direction:column;gap:10px}
.exc{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid transparent;transition:border-color .2s}
.exc.has-data{border-color:rgba(34,197,94,.3)}
.exc.partial{border-color:rgba(245,197,24,.25)}
.exc-hdr{display:flex;align-items:center;gap:12px;padding:15px;cursor:pointer;position:relative}
.exc-hdr::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:4px;border-radius:0 4px 4px 0;background:var(--border)}
.exc.has-data .exc-hdr::before{background:var(--green)}
.exc.partial .exc-hdr::before{background:var(--gold)}
.exc-em{width:44px;height:44px;border-radius:12px;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;cursor:pointer;transition:transform .15s var(--spring)}
.exc-em:active{transform:scale(.88)}
.exc-info{flex:1;min-width:0}
.exc-name{font-size:1.05rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exc-meta{font-size:.74rem;color:var(--text2);margin-top:3px}
.rest-chip{display:inline-flex;align-items:center;gap:3px;background:var(--card3);border-radius:99px;padding:4px 10px;font-size:.68rem;font-weight:700;color:var(--gold);cursor:pointer;margin-top:5px}
.badge{font-size:.66rem;font-weight:800;padding:3px 8px;border-radius:99px;flex-shrink:0}
.badge.up{background:rgba(34,197,94,.16);color:var(--green)}
.badge.down{background:rgba(255,45,58,.16);color:var(--red2)}
.badge.same{background:rgba(245,197,24,.16);color:var(--gold)}
.badge.new{background:rgba(59,130,246,.16);color:#5b9dff}
.sets-area{padding:0 15px 14px;display:none}
.exc.open .sets-area{display:block}
.sets-hdr{display:grid;grid-template-columns:28px 1fr 1fr 44px;gap:8px;margin-bottom:6px}
.sets-hdr span{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);text-align:center}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 44px;gap:8px;align-items:center;margin-bottom:7px}
.set-num{font-size:.78rem;font-weight:800;color:var(--text3);text-align:center;width:28px;height:28px;border-radius:99px;display:flex;align-items:center;justify-content:center;background:var(--card3);transition:.2s}
.set-num.done{background:rgba(34,197,94,.16);color:var(--green)}
.set-inp{background:var(--card3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:10px 6px;text-align:center;font-size:.95rem;font-weight:700;width:100%;transition:.2s}
.set-inp:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
.set-inp.done{border-color:rgba(34,197,94,.4);color:var(--green)}
.rest-btn{width:44px;height:44px;border-radius:10px;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;color:var(--gold);border:none;transition:transform .12s var(--spring)}
.rest-btn:active{transform:scale(.87)}
.prog-strip{margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:.72rem;color:var(--text2)}
.prog-track{background:var(--card3);border-radius:99px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .7s var(--ease)}
.prog-hint{font-size:.68rem;color:var(--text3);margin-top:6px}
.add-set-row{display:flex;gap:8px;margin-top:9px}
.save-bar{position:sticky;bottom:calc(var(--tab-h) + var(--safe-b) + 8px);padding:10px 16px 0;z-index:10;background:linear-gradient(0,var(--bg) 65%,transparent)}
.pill-row{display:flex;gap:8px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none}
.pill-row::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:9px 18px;border-radius:99px;font-size:.85rem;font-weight:700;cursor:pointer;background:var(--card);color:var(--text2);transition:.15s}
.pill.active{background:var(--red);color:#fff;box-shadow:0 4px 12px var(--red-glow)}

/* ── BUTTONS / MODAL ── */
.btn{border:none;border-radius:14px;padding:15px 18px;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .12s var(--spring),filter .2s}
.btn:active{transform:scale(.96)}
.btn.primary{background:var(--red);color:#fff;box-shadow:0 5px 18px var(--red-glow)}
.btn.ghost{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn.success{background:var(--green);color:#fff;box-shadow:0 5px 18px rgba(34,197,94,.3)}
.btn.danger-txt{background:none;color:var(--text3);padding:8px 12px;font-size:.85rem;font-weight:600}
.btn.full{width:100%;display:block;text-align:center}
.btn.sm{padding:11px 14px;font-size:.85rem}

/* ═══════════ PACOTE PREMIUM ═══════════ */
/* Botão primário com brilho deslizante (shine) + glow pulsante */
.btn.primary{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--red2),var(--red) 55%,var(--red-dark));box-shadow:0 6px 22px var(--red-glow),inset 0 1px 0 rgba(255,255,255,.25)}
.btn.primary::before{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-18deg);animation:btnShine 3.6s var(--ease) infinite}
@keyframes btnShine{0%{left:-120%}55%,100%{left:160%}}
.btn.primary.glow{animation:btnGlow 2.4s ease-in-out infinite}
@keyframes btnGlow{0%,100%{box-shadow:0 6px 22px var(--red-glow),inset 0 1px 0 rgba(255,255,255,.25)}50%{box-shadow:0 6px 34px var(--red-glow),0 0 0 4px rgba(255,45,58,.12),inset 0 1px 0 rgba(255,255,255,.25)}}

/* Pastilha RECOMENDADO flutuante */
.reco-pill{position:absolute;top:-11px;right:14px;z-index:3;background:linear-gradient(135deg,var(--red2),var(--red-dark));color:#fff;font-size:.66rem;font-weight:900;letter-spacing:.6px;padding:6px 13px;border-radius:99px;box-shadow:0 4px 16px var(--red-glow);text-transform:uppercase;animation:recoFloat 2.6s ease-in-out infinite}
@keyframes recoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* Tags flutuantes (bolhas) ao redor de um hero/figura */
.float-tags{position:relative;width:100%}
.f-tag{position:absolute;background:rgba(255,255,255,.06);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:.84rem;font-weight:700;padding:9px 16px;border-radius:99px;box-shadow:0 6px 18px rgba(0,0,0,.35);white-space:nowrap;animation:tagFloat 4s ease-in-out infinite}
.f-tag.red{background:rgba(255,45,58,.18);border-color:rgba(255,45,58,.4);color:var(--red2);box-shadow:0 6px 18px var(--red-glow)}
.f-tag:nth-child(2){animation-delay:.5s}
.f-tag:nth-child(3){animation-delay:1s}
.f-tag:nth-child(4){animation-delay:1.5s}
.f-tag:nth-child(5){animation-delay:2s}
@keyframes tagFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* Fundo "tech": grade de pontos + linhas + glow vermelho */
.tech-bg{position:relative;overflow:hidden}
.tech-bg::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.07) 1px,transparent 1px);background-size:22px 22px;opacity:.5;pointer-events:none}
.tech-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,var(--red-glow),transparent 60%);opacity:.35;pointer-events:none}

/* Boneco 3D agora num palco "tech" com glow vermelho */
.lib-3d-wrap{background:radial-gradient(ellipse at 50% 35%,#2a1518,#161619 70%)}
.lib-3d-wrap::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,45,58,.10) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;z-index:1}
.lib-3d-wrap::after{content:'';position:absolute;left:50%;bottom:0;width:62%;height:34%;transform:translateX(-50%);background:radial-gradient(ellipse at center bottom,var(--red-glow),transparent 70%);opacity:.5;pointer-events:none;z-index:1}
.lib-3d{position:relative;z-index:2}

/* Chips de "tecnologia" em linha (Força, Calorias, Treinos...) */
.tech-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.tech-chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:99px;padding:8px 14px;font-size:.8rem;font-weight:700;color:var(--text2)}
.tech-chip i{width:7px;height:7px;border-radius:99px;background:var(--red);box-shadow:0 0 8px var(--red-glow)}

/* Stat trio (4 Treinos · 40-50 Min · 271 kcal) */
.stat-trio{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:16px;overflow:hidden;border:1px solid var(--border);margin:6px 0 4px}
.stat-trio .st{background:var(--bg2);padding:16px 8px;text-align:center}
.stat-trio .st .v{font-size:1.45rem;font-weight:900;letter-spacing:-.5px}
.stat-trio .st .v.red{color:var(--red2)}
.stat-trio .st .v.gold{color:var(--gold)}
.stat-trio .st .k{font-size:.66rem;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}

/* ═══════════ ONBOARDING ═══════════ */
.onb{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.onb.show{display:flex}
.onb-head{display:flex;align-items:center;justify-content:center;position:relative;padding:calc(18px + var(--safe-t)) 20px 8px}
.onb-back{position:absolute;left:20px;top:calc(14px + var(--safe-t));width:46px;height:46px;border-radius:50%;background:var(--card3);border:none;color:#fff;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.onb-step{font-size:1.05rem;font-weight:800;color:var(--text2)}
.onb-progress{display:flex;gap:6px;padding:14px 20px 0}
.onb-progress i{flex:1;height:4px;border-radius:99px;background:var(--card);transition:.4s var(--ease)}
.onb-progress i.on{background:var(--red);box-shadow:0 0 8px var(--red-glow)}
.onb-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column}
.onb-q{font-size:2.1rem;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:6px}
.onb-q .hl{color:var(--red2)}
.onb-sub{color:var(--text3);font-size:.95rem;margin-bottom:24px}
.onb-foot{padding:14px 20px calc(20px + var(--safe-b));background:linear-gradient(0deg,var(--bg) 70%,transparent)}
.onb-next{width:100%;border:none;border-radius:99px;padding:19px;font-size:1.05rem;font-weight:900;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--red2),var(--red) 55%,var(--red-dark));box-shadow:0 8px 26px var(--red-glow);position:relative;overflow:hidden;transition:transform .12s var(--spring)}
.onb-next:active{transform:scale(.97)}
.onb-next::before{content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-18deg);animation:btnShine 3.6s var(--ease) infinite}
.onb-next:disabled{opacity:.4;box-shadow:none}

/* opção tipo lista grande */
.onb-opt{display:flex;align-items:center;gap:16px;background:var(--card3);border:2px solid transparent;border-radius:20px;padding:20px;margin-bottom:14px;cursor:pointer;transition:.2s var(--ease)}
.onb-opt:active{transform:scale(.98)}
.onb-opt.sel{border-color:var(--red);background:rgba(255,45,58,.08)}
.onb-opt .oi{width:48px;height:48px;border-radius:14px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--red2);flex-shrink:0}
.onb-opt .ot{font-size:1.15rem;font-weight:800}
.onb-opt .od{font-size:.82rem;color:var(--text3);margin-top:3px}
.onb-opt .oc{margin-left:auto;color:var(--text3);font-size:1.2rem}

/* card de objetivo com foto/gradiente */
.goal-card{position:relative;border-radius:20px;overflow:hidden;margin-bottom:14px;cursor:pointer;min-height:128px;display:flex;align-items:center;padding:24px;background:linear-gradient(120deg,#2a1216,#1a1a1f);border:2px solid transparent;transition:.2s var(--ease)}
.goal-card:active{transform:scale(.98)}
.goal-card.sel{border-color:var(--red)}
.goal-card .gc-art{position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:6rem;opacity:.14}
.goal-card .gc-t{font-size:1.5rem;font-weight:900;letter-spacing:-.5px;position:relative;z-index:1;max-width:60%;line-height:1.1}

/* roleta de número (idade) */
.wheel{height:280px;overflow:hidden;position:relative;text-align:center;-webkit-mask-image:linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent)}
.wheel-scroll{overflow-y:scroll;height:100%;scroll-snap-type:y mandatory;padding:112px 0}
.wheel-scroll::-webkit-scrollbar{display:none}
.wheel-item{height:56px;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:var(--text3)}
.wheel-item.active{font-size:2.6rem;font-weight:900;color:#fff}
.wheel-center{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:56px;border-radius:16px;background:var(--card3);pointer-events:none}

/* slider régua horizontal (peso) */
.big-num{text-align:center;font-size:4.5rem;font-weight:900;letter-spacing:-3px;margin:30px 0 10px}
.big-num small{font-size:1.6rem;color:var(--text3);font-weight:700;letter-spacing:0}
.ruler{position:relative;height:70px;display:flex;align-items:center;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 20%,#000 80%,transparent)}
.ruler input{position:absolute;width:100%;height:100%;opacity:0;cursor:pointer;z-index:3;margin:0}
.ruler-ticks{display:flex;align-items:center;justify-content:center;gap:0;width:100%;pointer-events:none}
.ruler-needle{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:4px;height:42px;background:var(--red);border-radius:2px;box-shadow:0 0 10px var(--red-glow);z-index:2}
.unit-toggle{display:flex;background:var(--card3);border-radius:99px;padding:5px;width:max-content;margin:0 auto 10px}
.unit-toggle div{padding:11px 34px;border-radius:99px;font-weight:800;font-size:.9rem;color:var(--text3);cursor:pointer}
.unit-toggle div.on{background:var(--card);color:#fff}

/* altura vertical */
.vruler{position:relative;height:300px;display:flex;justify-content:flex-end;align-items:center;overflow:hidden;-webkit-mask-image:linear-gradient(180deg,transparent,#000 20%,#000 80%,transparent)}
.vruler input{position:absolute;right:0;width:90px;height:100%;opacity:0;cursor:pointer;z-index:3}

/* IMC / dica box */
.onb-hint{display:flex;gap:12px;align-items:flex-start;background:var(--card3);border-radius:16px;padding:16px;margin-top:18px}
.onb-hint .hi{font-size:1.5rem}
.onb-hint .ht{font-size:.92rem;color:var(--text2);line-height:1.4}
.onb-hint .ht b{color:var(--red2)}

/* contador +/- */
.counter{display:flex;align-items:center;justify-content:center;gap:30px;margin:40px 0}
.counter button{width:74px;height:74px;border-radius:50%;border:none;background:var(--card3);color:#fff;font-size:2rem;cursor:pointer;transition:transform .12s var(--spring)}
.counter button:active{transform:scale(.9)}
.counter .cval{font-size:5rem;font-weight:900;min-width:120px;text-align:center}
.counter-unit{text-align:center;font-size:1.3rem;color:var(--text3);font-weight:700;margin-top:-20px}

/* foco muscular com boneco lateral */
.focus-row{display:flex;gap:14px}
.focus-list{flex:1;display:flex;flex-direction:column;gap:11px}
.focus-opt{padding:17px;border-radius:14px;background:var(--card3);border:2px solid transparent;font-weight:700;cursor:pointer;transition:.2s}
.focus-opt.sel{border-color:var(--red);color:var(--red2);background:rgba(255,45,58,.08)}
.focus-body{width:120px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.focus-body svg{width:100%;height:auto}

/* tela final */
.onb-done{text-align:center;padding-top:30px}
.onb-done h1{font-size:2.4rem;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:24px}
.onb-done h1 .hl{color:var(--red2)}

/* ── GRADE DE FOCO MUSCULAR ── */
.focus-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 14px}
.focus-head .fh-label{font-size:.82rem;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--text2)}
.focus-head .fh-right{display:flex;align-items:center;gap:10px;font-size:1rem;color:var(--text2);font-weight:600}
.fh-toggle{width:52px;height:30px;border-radius:99px;background:var(--card);position:relative;cursor:pointer;transition:.25s;flex-shrink:0}
.fh-toggle.on{background:var(--red)}
.fh-toggle::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.25s var(--spring)}
.fh-toggle.on::after{left:25px}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.mgrid-card{background:var(--card3);border:2px solid transparent;border-radius:18px;padding:14px 8px 12px;text-align:center;cursor:pointer;transition:.18s var(--ease)}
.mgrid-card:active{transform:scale(.96)}
.mgrid-card.sel{border-color:var(--red);background:rgba(255,45,58,.08)}
.mgrid-card svg{width:62px;height:auto;margin-bottom:6px}
.mgrid-card .mg-name{font-size:.88rem;font-weight:700;color:var(--text2)}
.mgrid-card.sel .mg-name{color:#fff}

/* ═══════════ TREINO ATIVO (padrão Befit) ═══════════ */
.aw-stats{display:flex;align-items:center;justify-content:space-around;background:var(--card3);border-radius:22px;padding:20px 12px;margin-bottom:18px}
.aw-stat{text-align:center;flex:1}
.aw-stat .av{font-size:1.7rem;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;justify-content:center;gap:7px}
.aw-stat .av .live{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red-glow);animation:livePulse 1.6s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.35}}
.aw-stat .ak{font-size:.84rem;color:var(--text3);margin-top:4px;font-weight:500}

.aw-exhead{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px}
.aw-exhead .ec{font-size:1.02rem;font-weight:800;letter-spacing:.3px}
.aw-exhead .ea{font-size:1rem;color:var(--text2);font-weight:600;cursor:pointer}

/* card de exercício na lista do treino ativo */
.awx{display:flex;align-items:center;gap:16px;padding:16px 4px;border-bottom:1px solid var(--border-v);cursor:pointer}
.awx:last-child{border-bottom:none}
.awx-thumb{width:74px;height:74px;border-radius:18px;background:#fff;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.awx-thumb img{width:100%;height:100%;object-fit:cover}
.awx-thumb .ph{font-size:1.8rem;opacity:.3}
.awx-thumb .mini-badge{position:absolute;right:-6px;bottom:-6px;width:38px;height:38px;border-radius:11px;background:var(--card3);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;padding:4px}
.awx-thumb .mini-badge svg{width:100%;height:auto}
.awx-thumb .check{position:absolute;right:-7px;bottom:-7px;width:40px;height:40px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:900;border:3px solid var(--bg);box-shadow:0 4px 12px var(--red-glow)}
.awx-body{flex:1;min-width:0}
.awx-rec{display:inline-flex;align-items:center;gap:6px;background:rgba(224,30,43,.16);color:var(--red2);font-size:.72rem;font-weight:800;letter-spacing:.4px;padding:5px 11px;border-radius:99px;text-transform:uppercase;margin-bottom:7px}
.awx-name{font-size:1.22rem;font-weight:800;line-height:1.15;letter-spacing:-.3px}
.awx-meta{font-size:1rem;color:var(--text3);margin-top:5px;font-weight:500}
.awx-meta.done{color:var(--red2);font-weight:700}
.awx-more{color:var(--text3);font-size:1.5rem;font-weight:900;padding:0 4px;cursor:pointer;flex-shrink:0;letter-spacing:-2px}

/* botão finalizar fixo */
.aw-finish{position:sticky;bottom:calc(var(--tab-h) + var(--safe-b) + 6px);padding-top:14px;background:linear-gradient(0deg,var(--bg) 62%,transparent);z-index:6}
.aw-finish button{width:100%;border:none;border-radius:99px;padding:20px;font-size:1.08rem;font-weight:900;letter-spacing:.5px;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--red2),var(--red) 55%,var(--red-dark));box-shadow:0 8px 26px var(--red-glow);display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;transition:transform .12s var(--spring)}
.aw-finish button:active{transform:scale(.97)}
.aw-finish button::before{content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);animation:btnShine 3.8s var(--ease) infinite}

/* detalhe de exercício aberto (séries) */
.awd{padding:8px 0 4px}
.awd-top{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.awd-note{color:var(--text3);font-size:1rem;padding:6px 0 18px;font-weight:500}
.awd-cols{display:grid;grid-template-columns:60px 1fr 1fr 56px;gap:10px;padding:0 6px 10px;font-size:.78rem;font-weight:800;letter-spacing:.5px;color:var(--text3);text-transform:uppercase}
.awd-cols span:nth-child(2),.awd-cols span:nth-child(3){text-align:center}
.awd-row{display:grid;grid-template-columns:60px 1fr 1fr 56px;gap:10px;align-items:center;background:var(--card3);border-radius:99px;padding:14px 6px;margin-bottom:11px;transition:.2s}
.awd-row.done{background:rgba(224,30,43,.07)}
.awd-row .rn{text-align:center;font-size:1.2rem;font-weight:800;color:var(--text2)}
.awd-row input{background:none;border:none;color:#fff;font-size:1.2rem;font-weight:700;text-align:center;width:100%;font-variant-numeric:tabular-nums}
.awd-row input:focus{outline:none}
.awd-row input::placeholder{color:var(--muted)}
.awd-check{width:44px;height:44px;border-radius:50%;background:var(--card);border:none;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:1.1rem;cursor:pointer;justify-self:center;transition:.2s var(--spring)}
.awd-check.on{background:var(--red);color:#fff;box-shadow:0 4px 12px var(--red-glow)}
.awd-check:active{transform:scale(.88)}
.awd-addset{display:flex;align-items:center;gap:10px;color:var(--text2);font-weight:700;font-size:1rem;padding:14px 6px;cursor:pointer}
.awd-addset .plus{width:42px;height:42px;border-radius:50%;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff}
.modal-scrim{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:80;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-scrim.show{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--bg2);width:100%;max-width:480px;border-radius:26px 26px 0 0;padding:12px 18px calc(22px + var(--safe-b));max-height:88vh;overflow-y:auto;border-top:3px solid var(--red);transform:translateY(100%);transition:transform .36s var(--ease)}
.modal-scrim.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--card2);border-radius:99px;margin:0 auto 16px}
.modal-title{font-size:1.2rem;font-weight:800;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.three-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:7px}
.field input,.field select{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:13px;font-size:.95rem;font-weight:600}
.field input:focus,.field select:focus{outline:none;border-color:var(--red)}
.chip-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{border:1.5px solid var(--border);background:var(--card);color:var(--text2);padding:9px 14px;border-radius:99px;font-size:.8rem;font-weight:700;cursor:pointer;transition:.16s var(--spring)}
.chip:active{transform:scale(.93)}
.chip.on{background:var(--red);border-color:var(--red);color:#fff}
.color-swatches{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
.swatch{width:40px;height:40px;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:transform .14s var(--spring)}
.swatch:active{transform:scale(.87)}
.swatch.sel{border-color:#fff}

/* ── REST OVERLAY ── */
.rest-overlay{position:fixed;inset:0;z-index:90;background:radial-gradient(ellipse at 50% 32%,#1a1a1f,var(--bg));display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.rest-overlay.show{opacity:1;pointer-events:auto}
.rest-eyebrow{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:26px}
.rest-ring{position:relative;width:230px;height:230px;display:flex;align-items:center;justify-content:center}
.rest-ring svg{position:absolute;inset:0;width:230px;height:230px;transform:rotate(-90deg)}
.r-track{fill:none;stroke:var(--card);stroke-width:10}
.r-fill{fill:none;stroke:var(--red2);stroke-width:10;stroke-linecap:round;filter:drop-shadow(0 0 7px var(--red-glow));transition:stroke-dashoffset .97s linear}
.rest-time{font-size:4rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-2px;z-index:1}
.rest-actions{display:flex;gap:9px;margin-top:28px}
.rest-hint{font-size:.72rem;color:var(--text3);margin-top:14px}
.rest-tip{margin:26px 20px 0;max-width:380px;width:88%;background:var(--card3);border-radius:16px;border-left:4px solid var(--red);padding:18px 18px 18px 20px;text-align:left;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.rest-tip .rt-label{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--red2);margin-bottom:9px}
.rest-tip .rt-label .sp{color:var(--red);font-size:.9rem}
.rest-tip .rt-text{font-size:.98rem;color:var(--text);line-height:1.45}
.rest-tip .rt-more{display:inline-block;margin-top:10px;font-size:.85rem;font-weight:800;color:#fff;text-decoration:underline;cursor:pointer}

.empty{padding:60px 20px;text-align:center;color:var(--text3)}
.empty .e-ico{font-size:3rem;margin-bottom:12px;display:block;opacity:.45}
.empty p{font-size:1rem;line-height:1.6;color:var(--text2)}
.empty b{color:var(--text)}
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--red);color:#fff;padding:12px 22px;border-radius:99px;font-weight:700;font-size:.88rem;opacity:0;transition:.28s var(--spring);pointer-events:none;z-index:99;box-shadow:0 7px 20px var(--red-glow);white-space:nowrap;max-width:88%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

const MODEL_SRC="corpo-humano.glb";

const MK=Object.keys(MUSCLES);
const LIBRARY={peito:['Supino reto','Supino inclinado','Supino declinado','Crucifixo','Crossover','Peck Deck'],costas:['Puxada frontal','Remada curvada','Remada baixa','Barra fixa','Pulldown'],ombros:['Desenvolvimento','Elevação lateral','Elevação frontal','Crucifixo invertido','Encolhimento'],biceps:['Rosca direta','Rosca alternada','Rosca martelo','Rosca Scott','Rosca concentrada'],triceps:['Tríceps testa','Tríceps corda','Tríceps francês','Mergulho no banco'],quadriceps:['Agachamento','Leg press','Cadeira extensora','Afundo','Hack squat'],posterior:['Stiff','Mesa flexora','Cadeira flexora','Levantamento terra'],gluteos:['Elevação pélvica','Agachamento sumô','Coice na polia','Abdução de quadril'],abdomen:['Abdominal supra','Prancha','Elevação de pernas','Crunch no cabo'],panturrilha:['Panturrilha em pé','Panturrilha sentado','Panturrilha no leg']};
const DAYS_SHORT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MEAL_NAMES=['Café da manhã','Almoço','Lanche','Jantar','Ceia'];

const KEY='trainee_pro_v2';
let D=load();
let page='treino', subpage='inicio';
let currentTodayWid=null, buildingMuscles=new Set(), currentBuildWid=null;
let sessionStart=null, sessionTimer=null;
let restInterval=null, restRem=0, restTot=0;
let photoWid=null, currentFoodMeal=null, libFilter='todos', libTab='todos';
let selectedLibEx=null;
let openTC=null;

const EX_TIPS={
  'Supino reto':'Deite no banco, segure a barra na largura dos ombros e desça até o peito controlando o movimento. Empurre de volta sem travar os cotovelos.',
  'Supino inclinado':'No banco inclinado a 30–45°, desça a barra até a parte superior do peito e empurre focando no peitoral superior.',
  'Crucifixo':'Com halteres, abra os braços em arco mantendo leve flexão nos cotovelos, sentindo o alongamento do peito.',
  'Agachamento':'Pés na largura dos ombros, desça empurrando o quadril para trás até as coxas ficarem paralelas ao chão. Mantenha o tronco firme.',
  'Levantamento terra':'Quadril para trás, coluna neutra, puxe a barra rente às pernas usando glúteos e posterior. Não arredonde as costas.',
  'Rosca direta':'Cotovelos fixos ao lado do corpo, suba a barra contraindo o bíceps. Desça controlado.',
  'Puxada frontal':'Puxe a barra até a altura do queixo aproximando as escápulas. Foque nas costas, não nos braços.',
  'Desenvolvimento':'Empurre os halteres acima da cabeça sem arquear as costas, controlando a descida.',
};


function load(){const raw=localStorage.getItem(KEY);if(raw){try{return ensure(JSON.parse(raw));}catch{}}for(const k of['trainee_data_v7','trainee_pro_v1']){const o=localStorage.getItem(k);if(o){try{return ensure(JSON.parse(o));}catch{}}}return ensure({});}
function ensure(d){d.workouts=d.workouts||[];d.history=d.history||[];d.settings=d.settings||{user:'Atleta',color:'#E01E2B',kcalMeta:2000,objetivo:'Hipertrofia'};if(d.settings.color==='#FF2D3A'||d.settings.color==='#e11d2a')d.settings.color='#E01E2B';d.trainedDays=d.trainedDays||[];d.waterToday=d.waterToday||0;if(!d.meals||!d.meals.length)d.meals=MEAL_NAMES.map(n=>({id:uid(),name:n,foods:[]}));return d;}
function save(){localStorage.setItem(KEY,JSON.stringify(D))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function applyTheme(){const c=D.settings.color||'#E01E2B';document.documentElement.style.setProperty('--red',c);document.documentElement.style.setProperty('--red2',lighten(c,28));document.documentElement.style.setProperty('--red-glow',hexA(c,.4));const dn=document.getElementById('drawerName');if(dn)dn.textContent=D.settings.user||'Atleta';}
function lighten(hex,p){try{let n=parseInt(hex.slice(1),16);return `rgb(${Math.min(255,((n>>16)&255)+p)},${Math.min(255,((n>>8)&255)+p)},${Math.min(255,(n&255)+p)})`;}catch{return hex;}}
function hexA(hex,a){try{const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}catch{return `rgba(255,45,58,${a})`;}}
function volume(s){return s.reduce((t,x)=>t+(parseFloat(x.weight)||0)*(parseInt(x.reps)||0),0)}
function maxW(s){return s.reduce((m,x)=>Math.max(m,parseFloat(x.weight)||0),0)}
function wkMuscles(w){const s=new Set();w.exercises.forEach(e=>(e.muscles||[]).forEach(m=>s.add(m)));return[...s]}
function wkSets(w){return w.exercises.reduce((t,e)=>t+e.sets.length,0)}
function wkVol(w){return w.exercises.reduce((t,e)=>t+volume(e.sets),0)}
function fmtTime(s){const m=Math.floor(s/60);return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function escH(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`}
function totalMacros(meals,f){return(meals||[]).reduce((t,m)=>(m.foods||[]).reduce((s,fo)=>s+(parseFloat(fo[f])||0),t),0)}

function openDrawer(){const dp=document.getElementById('drawerPic');if(dp)dp.textContent=(D.settings.user||'A')[0].toUpperCase();document.getElementById('drawer').classList.add('show');document.getElementById('drawerScrim').classList.add('show');}
function closeDrawer(){document.getElementById('drawer').classList.remove('show');document.getElementById('drawerScrim').classList.remove('show');}

function go(p,sp){page=p;if(sp)subpage=sp;else if(p==='treino')subpage='inicio';document.getElementById('scrollArea').scrollTop=0;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.p===p));applyTheme();render();}

function render(){
  const el=document.getElementById('pageContent');el.innerHTML='';
  const bt=document.getElementById('bigtabs');
  const pg=document.createElement('div');pg.className='page';el.appendChild(pg);
  if(page==='treino'){
    renderBigtabs(bt,[['inicio','Treino'],['ficha','Minha ficha'],['exercicios','Exercícios']],subpage);
    if(subpage==='inicio')renderTreinoInicio(pg);
    else if(subpage==='ficha')renderMinhaFicha(pg);
    else if(subpage==='exercicios')renderExercicios(pg);
    else if(subpage==='atual')renderTreinoAtual(pg);
  } else if(page==='dieta'){bt.style.display='none';renderDieta(pg);}
  else if(page==='perfil'){bt.style.display='none';renderPerfil(pg);}
  else if(page==='historia'){bt.style.display='none';renderHistoria(pg);}
  else if(page==='focorapido'){bt.style.display='none';renderFocoRapido(pg);}
}
function renderBigtabs(bt,tabs,active){bt.style.display='flex';bt.innerHTML='';tabs.forEach(([k,label])=>{const d=document.createElement('div');d.className='bigtab'+((k===active||(k==='inicio'&&active==='atual'))?' active':'');d.textContent=label;d.onclick=()=>go('treino',k);bt.appendChild(d);});}

/* ── TREINO INÍCIO (tela 1 do Gwoth) ── */
function renderTreinoInicio(pg){
  const now=new Date(),dow=now.getDay();
  const meals=D.meals||[],consumed=Math.round(totalMacros(meals,'kcal')),meta=D.settings.kcalMeta||2000;
  const kpct=Math.min(100,Math.round(consumed/meta*100));
  // panel
  const panel=document.createElement('div');panel.className='panel';
  panel.innerHTML=`<div class="panel-title">Treinos feitos na semana</div>
    <div class="panel-divider"></div>
    <div class="panel-section"><div class="week-circles">${DAYS_SHORT.map((d,i)=>{
      const trained=D.trainedDays.includes(`${now.getFullYear()}-${now.getMonth()}-${now.getDate()-dow+i}`);
      return `<div class="wc${i===dow?' today':''}${trained?' done':''}"><div class="wc-lbl">${d}</div><div class="wc-circle">${trained?'●':''}</div></div>`;
    }).join('')}</div></div>
    <div class="panel-divider"></div>
    <div class="panel-title" style="font-size:1.25rem">Meta de gasto calórico</div>
    <div class="panel-section" style="padding-top:6px"><div class="kcal-bar-track"><div class="kcal-bar-fill" style="width:${kpct}%"></div></div></div>
    <div class="panel-divider"></div>
    <div class="panel-links"><div class="panel-link" onclick="go('treino','exercicios')">Exercícios rápidos</div><div class="panel-link" onclick="go('historia')">Ver histórico</div></div>`;
  pg.appendChild(panel);

  // heading
  const h=document.createElement('div');h.className='heading';h.textContent='Ficha de treinos completas';pg.appendChild(h);
  const fr=document.createElement('div');fr.className='filter-row';
  fr.innerHTML=`<span class="fl-label">Filtrar por:</span><button class="filter-tag" onclick="toast('Filtro por nível em breve')">Nível</button><button class="filter-tag" onclick="go('treino','ficha')">Treino</button>`;
  pg.appendChild(fr);

  if(!D.workouts.length){
    pg.appendChild(emptyEl('','Nenhuma ficha ainda.<br>Vá em <b>Minha ficha</b> para criar.'));
  } else {
    const grid=document.createElement('div');grid.className='ficha-grid';
    D.workouts.forEach(w=>{
      const muscles=wkMuscles(w);
      const card=document.createElement('div');card.className='ficha-card';
      card.onclick=()=>{currentTodayWid=w.id;go('treino','atual');};
      card.innerHTML=`${w.photo?`<div class="fc-photo" style="background-image:url(${w.photo})"></div>`:''}<div class="fc-grad"></div><div class="fc-body"><div class="fc-name">${escH(w.name)}</div><div class="fc-meta">${w.exercises.length} ex · ${muscles.length} grupos</div></div>`;
      grid.appendChild(card);
    });
    pg.appendChild(grid);

    // floating iniciar
    if(!currentTodayWid||!D.workouts.find(w=>w.id===currentTodayWid))currentTodayWid=D.workouts[0].id;
    const fl=document.createElement('div');fl.className='iniciar-float';
    fl.innerHTML=`<button class="iniciar-btn" onclick="go('treino','atual')">INICIAR TREINO</button>`;
    pg.appendChild(fl);
  }
}

    <div class="detail-info-title">Tempo de descanso</div>

        <div class="tc-body"><div><div class="tc-body-inner">

function toggleTC(wid){if(openTC===wid){openTC=null;}else{openTC=wid;}render();}

/* ── EXERCÍCIOS (tela 5 do Gwoth) ── */
function renderExercicios(pg){
  const tog=document.createElement('div');tog.className='toggle-pill';
  tog.innerHTML=`<div class="toggle-pill-btn${libTab==='todos'?' active':''}" onclick="libTab='todos';render()">Todos os exercícios</div><div class="toggle-pill-btn${libTab==='pessoais'?' active':''}" onclick="libTab='pessoais';render()">Exercícios pessoais</div>`;
  pg.appendChild(tog);
  const sb=document.createElement('div');sb.className='search-box';
  sb.innerHTML=`<input id="libQ" placeholder="Buscar exercícios" oninput="renderLibList(this.value)"><span class="si"></span>`;
  pg.appendChild(sb);
  const cc=document.createElement('div');cc.className='cat-chips';
  ['todos',...Object.keys(MUSCLES)].forEach(k=>{const c=document.createElement('div');c.className='cat-chip'+(libFilter===k?' active':'');c.textContent=k==='todos'?'Todos':MUSCLES[k]?.nome||k;c.onclick=()=>{libFilter=k;selectedLibEx=null;renderLibList(document.getElementById('libQ')?.value||'');};cc.appendChild(c);});
  pg.appendChild(cc);
  const la=document.createElement('div');la.id='libListArea';pg.appendChild(la);
  renderLibList('',la);
}
function renderLibList(q,root){
  q=(q||'').toLowerCase().trim();const area=root||document.getElementById('libListArea');if(!area)return;area.innerHTML='';
  // build flat list of matches
  const matches=[];
  Object.keys(LIBRARY).forEach(mk=>{if(libFilter!=='todos'&&libFilter!==mk)return;LIBRARY[mk].filter(n=>n.toLowerCase().includes(q)).forEach(name=>matches.push({mk,name}));});
  if(!matches.length){area.appendChild(emptyEl('','Nenhum exercício encontrado.'));return;}

  const split=document.createElement('div');
  split.className='lib-split'+(selectedLibEx?' has-detail':'');

  // LEFT list
  const list=document.createElement('div');list.className='lib-col-list';
  matches.forEach(({mk,name})=>{
    const row=document.createElement('div');
    row.className='lib-ex-row'+(selectedLibEx&&selectedLibEx.name===name?' active':'');
    row.innerHTML=`<div class="lib-ex-name">${name}</div>${selectedLibEx?'':`<div class="lib-ex-muscle">${MUSCLES[mk]?.nome||mk}</div>`}`;
    row.onclick=()=>{selectedLibEx={mk,name};renderLibList(document.getElementById('libQ')?.value||'');};
    list.appendChild(row);
  });
  split.appendChild(list);

  // RIGHT detail panel
  if(selectedLibEx){
    const det=document.createElement('div');det.className='lib-col-detail';
    const mk=selectedLibEx.mk,name=selectedLibEx.name;
    det.innerHTML=`
      <div class="lib-detail-head">
        <div class="lib-detail-name">${name}</div>
        <div class="lib-detail-close" onclick="selectedLibEx=null;renderLibList(document.getElementById('libQ')?.value||'')">×</div>
      </div>
      <div class="lib-detail-tag">${MUSCLES[mk]?.nome||mk}</div>
      <div class="lib-body-viewer">${libBodyViews(mk)}</div>
      <div class="lib-detail-info">
        <div class="ldi-title">Músculo principal</div>
        <div class="ldi-text">${MUSCLES[mk]?.nome||mk}</div>
        <div class="ldi-title">Como executar</div>
        <div class="ldi-text">${EX_TIPS[name]||'Mantenha a postura controlada, evite usar impulso e foque na contração do músculo alvo durante todo o movimento.'}</div>
        <div class="ldi-title">Dica</div>
        <div class="ldi-text">Controle a fase excêntrica (descida) por 2–3 segundos para maximizar o estímulo.</div>
      </div>
      <button class="btn primary full glow" style="margin-top:14px" onclick="addFromLib('${mk}','${name.replace(/'/g,"\\'")}')">+ Adicionar a um treino</button>`;
    split.appendChild(det);
    setTimeout(checkModelViewerLib,50);
  }
  area.appendChild(split);
}

/* corpo 3D wireframe — 3 vistas (frente/lado/costas) com músculo destacado */

  return `<div class="lib-3d-wrap">
    <model-viewer id="libModel" class="lib-3d"
      src="${MODEL_SRC}"
      camera-controls
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="20deg"
      interaction-prompt="none"
      camera-orbit="0deg 90deg auto"
      field-of-view="30deg"
      environment-image="neutral"
      exposure="1.2"
      shadow-intensity="0.4"
      tone-mapping="neutral"
      touch-action="pan-y"
      onload="document.getElementById('model3dStatus')&&(document.getElementById('model3dStatus').style.display='none')"
      onerror="model3dError()"></model-viewer>
    <div class="lib-3d-status" id="model3dStatus">
      <div class="m3d-spin"></div>
      <div class="m3d-msg" id="model3dMsg">Carregando modelo 3D...</div>

  </div>
  <div class="lib-view-tabs">
    <div class="lvt active" onclick="setModelView('front',this)">Frente</div>
    <div class="lvt" onclick="setModelView('side',this)">Lado</div>
    <div class="lvt" onclick="setModelView('back',this)">Costas</div>
  </div>
  <div class="tech-chips">
    <span class="tech-chip"><i></i>${MUSCLES[mk]?.nome||mk}</span>
    <span class="tech-chip"><i></i>Força</span>
    <span class="tech-chip"><i></i>Hipertrofia</span>
  </div>`;
}
function model3dError(){
  const s=document.getElementById('model3dStatus');
  if(s){s.innerHTML='<div class="m3d-msg">Não foi possível carregar o modelo 3D.<br><span style="font-size:.78rem;color:var(--text3)">Verifique sua conexão e recarregue.</span></div>';}
}
// detecta se a lib model-viewer carregou; se não, avisa
function checkModelViewerLib(){
  setTimeout(()=>{
    const mv=document.getElementById('libModel');
    if(mv&&!(window.customElements&&customElements.get('model-viewer'))){
      const s=document.getElementById('model3dStatus');
      if(s)s.innerHTML='<div class="m3d-msg">Visualizador 3D precisa de internet na 1ª vez.<br><span style="font-size:.78rem;color:var(--text3)">Conecte-se e recarregue o app.</span></div>';
    }
  },4000);
}
function setModelView(view,el){
  document.querySelectorAll('.lvt').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const mv=document.getElementById('libModel');
  if(!mv)return;
  const orbit={front:'0deg 90deg auto',side:'90deg 90deg auto',back:'180deg 90deg auto'}[view];
  mv.removeAttribute('auto-rotate');
  mv.cameraOrbit=orbit;
}

/* ── TREINO ATUAL (workout em andamento) ── */
function renderTreinoAtual(pg){
  if(!D.workouts.length){pg.appendChild(emptyEl('','Nenhum treino criado.'));return;}
  if(!currentTodayWid||!D.workouts.find(w=>w.id===currentTodayWid))currentTodayWid=D.workouts[0].id;
  const w=D.workouts.find(x=>x.id===currentTodayWid);if(!w)return;
  if(!sessionStart){sessionStart=Date.now();startTimer();}
  const dur=Math.floor((Date.now()-sessionStart)/1000);
  const totalVol=wkVol(w), kcal=Math.round(totalVol*0.06+dur*0.09);

  // seletor de treino (pills) só se houver mais de um
  if(D.workouts.length>1){
    const pr=document.createElement('div');pr.className='pill-row';
    D.workouts.forEach(x=>{const p=document.createElement('div');p.className='pill'+(x.id===currentTodayWid?' active':'');p.textContent=x.name;p.onclick=()=>{currentTodayWid=x.id;render();};pr.appendChild(p);});
    pg.appendChild(pr);
  }

  // barra de stats topo
  const stats=document.createElement('div');stats.className='aw-stats';
  stats.innerHTML=`<div class="aw-stat"><div class="av"><span class="live"></span><span id="durVal">${fmtTime(dur)}</span></div><div class="ak">Duração</div></div>
    <div class="aw-stat"><div class="av" id="kcalVal">${kcal}</div><div class="ak">Calorias</div></div>
    <div class="aw-stat"><div class="av" id="volVal">${totalVol.toLocaleString('pt-BR')}</div><div class="ak">Volume (kg)</div></div>`;
  pg.appendChild(stats);

  // cabeçalho da lista
  const head=document.createElement('div');head.className='aw-exhead';
  head.innerHTML=`<span class="ec">${w.exercises.length} EXERCÍCIOS</span><span class="ea" onclick="go('treino','ficha')">Adicionar exercício +</span>`;
  pg.appendChild(head);

  // lista de exercícios estilo Befit
  if(!w.exercises.length){pg.appendChild(emptyEl('','Adicione exercícios em Minha ficha.'));}
  else{
    const list=document.createElement('div');list.className='awx-list';
    w.exercises.forEach(ex=>list.appendChild(buildActiveExRow(w,ex)));
    pg.appendChild(list);
  }

  // botão finalizar
  const fin=document.createElement('div');fin.className='aw-finish';
  fin.innerHTML=`<button onclick="finishWorkout('${w.id}')"><span>✓</span> FINALIZAR TREINO</button>`;
  pg.appendChild(fin);
}

// linha de exercício no treino ativo (recolhida) — expande ao tocar
let openExId=null;
function buildActiveExRow(w,ex){
  const wrap=document.createElement('div');
  const doneSets=ex.sets.filter(s=>parseFloat(s.weight)>0&&parseInt(s.reps)>0).length;
  const allDone=doneSets===ex.sets.length&&ex.sets.length>0;
  const isRecord=allDone&&maxW(ex.sets)>(ex.lastSets?maxW(ex.lastSets):0);
  const peso=maxW(ex.sets)||0;
  const mk=(ex.muscles||[])[0];

  if(openExId===ex.id){
    // EXPANDIDO: mostra séries
    wrap.className='awd';
    let rows='';
    ex.sets.forEach((s,i)=>{const d=parseFloat(s.weight)>0&&parseInt(s.reps)>0;
      rows+=`<div class="awd-row ${d?'done':''}"><div class="rn">${i+1}</div>
        <input type="number" inputmode="numeric" placeholder="${ex.targetReps||'reps'}" value="${s.reps??''}" oninput="updateSet('${w.id}','${ex.id}',${i},'reps',this.value)">
        <input type="number" step="0.5" inputmode="decimal" placeholder="${ex.lastSets&&ex.lastSets[i]?ex.lastSets[i].weight:'kg'}" value="${s.weight??''}" oninput="updateSet('${w.id}','${ex.id}',${i},'weight',this.value)">
        <button class="awd-check ${d?'on':''}" onclick="toggleSetDone('${w.id}','${ex.id}',${i})">✓</button></div>`;
    });
    wrap.innerHTML=`<div class="awd-top"><div class="awx-thumb">${ex.img?`<img src="${ex.img}">`:`<span class="ph">🏋</span>`}${mk?`<div class="mini-badge">${miniBodyOnb([mk])}</div>`:''}</div>
      <div class="awx-body"><div class="awx-name">${escH(ex.name)}</div><div class="awx-meta">${ex.sets.length} sets · ${ex.targetReps||10} reps</div></div>

      ${rows}
      <div class="awd-addset" onclick="addSet('${w.id}','${ex.id}')"><div class="plus">+</div> Adicionar série</div>`;
  } else {
    // RECOLHIDO
    wrap.className='awx';
    wrap.onclick=(e)=>{if(e.target.closest('.awx-more'))return;openExId=ex.id;render();};
    wrap.innerHTML=`<div class="awx-thumb">${ex.img?`<img src="${ex.img}">`:`<span class="ph">🏋</span>`}${allDone?`<div class="check">✓</div>`:(mk?`<div class="mini-badge">${miniBodyOnb([mk])}</div>`:'')}</div>
      <div class="awx-body">${isRecord?`<div class="awx-rec">🏆 Novo recorde ${peso}kg</div>`:''}<div class="awx-name">${escH(ex.name)}</div><div class="awx-meta ${allDone?'done':''}">${allDone?`${doneSets}/${ex.sets.length} registrado · ${peso}kg`:`${ex.sets.length} sets · ${ex.targetReps||10} reps`}</div></div>
      <div class="awx-more" onclick="event.stopPropagation();showMuscleModal('${escH(ex.name).replace(/'/g,"\\'")}',${JSON.stringify(ex.muscles||[])})">⋮</div>`;
  }
  return wrap;
}
function toggleSetDone(wid,eid,idx){const w=D.workouts.find(x=>x.id===wid);const ex=w&&w.exercises.find(e=>e.id===eid);if(!ex)return;const s=ex.sets[idx];const done=parseFloat(s.weight)>0&&parseInt(s.reps)>0;
  if(done){s.weight='';s.reps='';}else{if(!s.reps)s.reps=ex.targetReps||10;if(!s.weight)s.weight=ex.lastSets&&ex.lastSets[idx]?ex.lastSets[idx].weight:(maxW(ex.sets)||20);vibrate(20);startRest(ex.rest||90,ex.name);}
  save();render();}

/* ── EXERCISE CARD ── */
function buildExCard(w,ex){
  const vol=volume(ex.sets),lastVol=ex.lastVolume||0;let badge='',pct=0,bc='var(--text3)',lt='';
  if(lastVol>0){pct=Math.round(vol/lastVol*100);const d=vol-lastVol;if(d>0){badge=`<span class="badge up">+${Math.round((vol/lastVol-1)*100)}%</span>`;bc='var(--green)';}else if(d<0){badge=`<span class="badge down">−${Math.round((vol/lastVol-1)*100)}%</span>`;bc='var(--red)';}else{badge=`<span class="badge same">→ igual</span>`;bc='var(--gold)';}lt=`Última: ${lastVol}kg · máx ${ex.lastSets?maxW(ex.lastSets):0}kg`;}
  else if(vol>0){badge=`<span class="badge new">1ª vez</span>`;pct=100;bc='#5b9dff';lt='Primeiro registro';}else lt='Preencha as séries para ver progressão';
  const bw=Math.min(pct,130)/1.3;
  const allDone=ex.sets.every(s=>parseFloat(s.weight)>0&&parseInt(s.reps)>0);
  const anyDone=ex.sets.some(s=>parseFloat(s.weight)>0||parseInt(s.reps)>0);
  const em=MUSCLES[ex.muscles?.[0]]?.em||'';const mt=(ex.muscles||[]).map(m=>MUSCLES[m]?.nome||m).join(', ');
  const card=document.createElement('div');card.className='exc'+(allDone?' has-data':anyDone?' partial':'');
  let rows=`<div class="sets-hdr"><span></span><span>Carga(kg)</span><span>Reps</span><span>⏱</span></div>`;
  ex.sets.forEach((s,i)=>{const done=parseFloat(s.weight)>0&&parseInt(s.reps)>0;rows+=`<div class="set-row"><div class="set-num${done?' done':''}">${i+1}</div><input class="set-inp${done?' done':''}" type="number" step="0.5" inputmode="decimal" placeholder="${ex.lastSets&&ex.lastSets[i]?ex.lastSets[i].weight:'kg'}" value="${s.weight??''}" oninput="updateSet('${w.id}','${ex.id}',${i},'weight',this.value)"><input class="set-inp${done?' done':''}" type="number" inputmode="numeric" placeholder="${ex.targetReps||'reps'}" value="${s.reps??''}" oninput="updateSet('${w.id}','${ex.id}',${i},'reps',this.value)"><button class="rest-btn" onclick="startRest(${ex.rest||90},'${escH(ex.name).replace(/'/g,"\\'")}')">›</button></div>`;});
  card.innerHTML=`<div class="exc-hdr" onclick="this.closest('.exc').classList.toggle('open')"><div class="exc-em" onclick="event.stopPropagation();showMuscleModal('${escH(ex.name)}',${JSON.stringify(ex.muscles||[])})">${em}</div><div class="exc-info"><div class="exc-name">${escH(ex.name)}</div><div class="exc-meta">${ex.sets.length} séries · ${ex.targetReps||'?'} reps${mt?' · '+mt:''}</div><div class="rest-chip" onclick="event.stopPropagation();startRest(${ex.rest||90},'${escH(ex.name).replace(/'/g,"\\'")}')">${ex.rest||90}s</div></div><div>${badge}</div></div>
    <div class="sets-area">${rows}<div class="add-set-row"><button class="btn ghost sm" style="flex:1" onclick="addSet('${w.id}','${ex.id}')">+ Série</button><button class="btn danger-txt" onclick="removeEx('${w.id}','${ex.id}')">remover</button></div><div class="prog-strip"><div class="prog-row"><span>Progressão ${badge}</span><b>${vol>0?vol+'kg':''}</b></div><div class="prog-track"><div class="prog-fill" style="width:${bw}%;background:${bc}"></div></div><div class="prog-hint">${lt}</div></div></div>`;
  return card;
}

function startTimer(){clearInterval(sessionTimer);sessionTimer=setInterval(()=>{if(page==='treino'&&subpage==='atual'&&sessionStart){const g=document.getElementById('durVal');if(g)g.textContent=fmtTime(Math.floor((Date.now()-sessionStart)/1000));}},1000);}
function startRest(sec,exName){restRem=sec||90;restTot=restRem;document.getElementById('restOverlay').classList.add('show');showRestTip(exName);updateRest();vibrate(40);clearInterval(restInterval);restInterval=setInterval(()=>{restRem--;updateRest();if(restRem<=0){stopRest();beep();vibrate([100,50,100]);toast('Bora! Próxima série');}},1000);}
const SHORT_TIPS=['Mantenha o abdômen contraído e o tronco estabilizado.','Controle a fase de descida, não deixe o peso cair.','Respire soltando o ar no esforço e puxando na volta.','Foque no músculo-alvo, evite usar impulso.','Amplitude completa rende mais que carga alta mal feita.'];
let _curTip='';
function showRestTip(exName){const tipEl=document.getElementById('restTip'),txt=document.getElementById('restTipText'),more=document.getElementById('restTipMore');if(!tipEl)return;let tip=exName&&EX_TIPS[exName];_curTip=tip||'';if(tip){txt.textContent=tip.length>90?tip.slice(0,88)+'…':tip;more.style.display=tip.length>90?'inline-block':'none';}else{txt.textContent=SHORT_TIPS[Math.floor(Math.random()*SHORT_TIPS.length)];more.style.display='none';}tipEl.style.display='block';}
function showTipDetail(){if(_curTip)toast(_curTip.length>120?_curTip:_curTip);}
function updateRest(){const m=Math.floor(restRem/60),s=restRem%60;document.getElementById('rTimer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;const r=100,c=2*Math.PI*r,pct=Math.max(0,restRem/Math.max(restTot,1));const ring=document.getElementById('rFill');ring.style.strokeDasharray=c;ring.style.strokeDashoffset=c*(1-pct);}
function addRest(d){restRem=Math.max(0,restRem+d);restTot=Math.max(restTot,restRem);updateRest();}
function stopRest(){clearInterval(restInterval);document.getElementById('restOverlay').classList.remove('show');}
function beep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[0,880],[.2,1100]].forEach(([t,f])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.start(ctx.currentTime+t);g.gain.setValueAtTime(.22,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.13);o.stop(ctx.currentTime+t+.13);});}catch{}}
function vibrate(p){try{navigator.vibrate&&navigator.vibrate(p);}catch{}}
