/* ═══════════ ONBOARDING ENGINE ═══════════ */
const ONB_GOALS=[
  {k:'condicionamento',t:'Melhorar Condicionamento',art:'🔥'},
  {k:'forte',t:'Ficar Mais Forte',art:'💪'},
  {k:'definir',t:'Definir o Corpo',art:'⚡'},
  {k:'musculos',t:'Ganhar Músculos',art:'🏋️'},
];
const ONB_FOCUS=[['corpo','Corpo inteiro'],['peito','Peito'],['costas','Costas'],['ombros','Ombros'],['biceps','Braços'],['abdomen','Abdômen'],['gluteos','Glúteos'],['quadriceps','Pernas']];
let onbStep=0, onbData={genero:null,objetivo:null,idade:20,altura:170,peso:70,unidadePeso:'kg',foco:'corpo',freq:4};
const ONB_TOTAL=8;

function startOnboarding(){onbStep=0;onbData={genero:null,objetivo:null,idade:20,altura:170,peso:70,unidadePeso:'kg',foco:'corpo',freq:4};document.getElementById('onb').classList.add('show');renderOnb();}
function onbPrev(){if(onbStep===0){if(D.settings.profile){document.getElementById('onb').classList.remove('show');}return;}onbStep--;renderOnb();}
function onbNextStep(){
  // validação por etapa
  if(onbStep===0&&!onbData.genero)return toast('Selecione uma opção');
  if(onbStep===1&&!onbData.objetivo)return toast('Escolha um objetivo');
  if(onbStep>=ONB_TOTAL-1){finishOnboarding();return;}
  onbStep++;renderOnb();
}
function onbPick(field,val){onbData[field]=val;renderOnb();}

function renderOnb(){
  const total=ONB_TOTAL;
  document.getElementById('onbStep').textContent=`${onbStep+1}/${total}`;
  document.getElementById('onbBack').style.visibility=(onbStep===0&&!D.settings.profile)?'hidden':'visible';
  const prog=document.getElementById('onbProg');prog.innerHTML='';
  for(let i=0;i<total;i++){const b=document.createElement('i');if(i<=onbStep)b.className='on';prog.appendChild(b);}
  const body=document.getElementById('onbBody'),next=document.getElementById('onbNext');
  next.textContent=onbStep>=total-1?'COMEÇAR':'PRÓXIMO';
  body.innerHTML='';
  body.scrollTop=0;

  if(onbStep===0){ // gênero
    body.innerHTML=`<div class="onb-q">Qual <span class="hl">gênero</span> você se identifica?</div><div class="onb-sub">Isso nos ajuda a personalizar seu plano</div>
    ${[['masculino','Masculino','♂'],['feminino','Feminino','♀'],['outro','Outro','⚲']].map(([k,t,i])=>`<div class="onb-opt ${onbData.genero===k?'sel':''}" onclick="onbPick('genero','${k}')"><div class="oi">${i}</div><div><div class="ot">${t}</div></div><div class="oc">›</div></div>`).join('')}`;
  }
  else if(onbStep===1){ // objetivo
    body.innerHTML=`<div class="onb-q">Qual é o seu <span class="hl">objetivo</span> atual?</div><div class="onb-sub">Vamos montar seu plano em torno disso</div>
    ${ONB_GOALS.map(g=>`<div class="goal-card ${onbData.objetivo===g.k?'sel':''}" onclick="onbPick('objetivo','${g.k}')"><div class="gc-art">${g.art}</div><div class="gc-t">${g.t}</div></div>`).join('')}`;
  }
  else if(onbStep===2){ // idade (roleta)
    body.innerHTML=`<div class="onb-q">Qual a sua <span class="hl">idade</span>?</div><div class="onb-sub">Arraste para selecionar</div>
    <div class="wheel"><div class="wheel-center"></div><div class="wheel-scroll" id="ageWheel"></div></div>`;
    const w=document.getElementById('ageWheel');
    for(let a=14;a<=90;a++){const it=document.createElement('div');it.className='wheel-item'+(a===onbData.idade?' active':'');it.textContent=a;it.dataset.val=a;w.appendChild(it);}
    setTimeout(()=>{const act=w.querySelector('.wheel-item.active');if(act)w.scrollTop=act.offsetTop-w.offsetHeight/2+act.offsetHeight/2;},30);
    let wt;w.onscroll=()=>{clearTimeout(wt);wt=setTimeout(()=>{const items=[...w.querySelectorAll('.wheel-item')];const c=w.scrollTop+w.offsetHeight/2;let best=items[0],bd=1e9;items.forEach(it=>{const d=Math.abs(it.offsetTop+it.offsetHeight/2-c);if(d<bd){bd=d;best=it;}});items.forEach(it=>it.classList.toggle('active',it===best));onbData.idade=+best.dataset.val;},80);};
  }
  else if(onbStep===3){ // altura
    body.innerHTML=`<div class="onb-q">Qual a sua <span class="hl">altura</span>?</div>
    <div class="big-num"><span id="hVal">${onbData.altura}</span> <small>cm</small></div>
    <div class="ruler"><div class="ruler-needle"></div><input type="range" min="130" max="220" value="${onbData.altura}" oninput="onbData.altura=+this.value;document.getElementById('hVal').textContent=this.value;drawRuler('hTicks',onbData.altura,130,220)"><div class="ruler-ticks" id="hTicks"></div></div>`;
    drawRuler('hTicks',onbData.altura,130,220);
  }
  else if(onbStep===4){ // peso + IMC
    const imc=(onbData.peso/Math.pow(onbData.altura/100,2)).toFixed(1);
    body.innerHTML=`<div class="onb-q">Qual o seu <span class="hl">peso</span>?</div>
    <div class="unit-toggle"><div class="${onbData.unidadePeso==='kg'?'on':''}" onclick="onbData.unidadePeso='kg';renderOnb()">KG</div><div class="${onbData.unidadePeso==='lb'?'on':''}" onclick="onbData.unidadePeso='lb';renderOnb()">LB</div></div>
    <div class="big-num"><span id="wVal">${onbData.peso}</span> <small>${onbData.unidadePeso}</small></div>
    <div class="ruler"><div class="ruler-needle"></div><input type="range" min="40" max="160" value="${onbData.peso}" oninput="onbData.peso=+this.value;document.getElementById('wVal').textContent=this.value;document.getElementById('imcV').textContent=(onbData.peso/Math.pow(onbData.altura/100,2)).toFixed(1);drawRuler('wTicks',onbData.peso,40,160)"><div class="ruler-ticks" id="wTicks"></div></div>
    <div class="onb-hint"><div class="hi">🔥</div><div class="ht">Seu IMC é de <b id="imcV">${imc}</b>. Vamos te ajudar a evoluir de forma saudável.</div></div>`;
    drawRuler('wTicks',onbData.peso,40,160);
  }
  else if(onbStep===5){ // foco muscular (grade)
    body.innerHTML=`<div class="onb-q">Qual região <span class="hl">focar</span>?</div><div class="onb-sub">Toque para selecionar um ou mais</div><div id="focusGridHost">${muscleGridHTML()}</div>`;
  }
  else if(onbStep===6){ // frequência
    body.innerHTML=`<div class="onb-q">Com que <span class="hl">frequência</span> quer treinar?</div>
    <div class="counter"><button onclick="onbData.freq=Math.max(1,onbData.freq-1);document.getElementById('freqV').textContent=onbData.freq">−</button><div class="cval" id="freqV">${onbData.freq}</div><button onclick="onbData.freq=Math.min(7,onbData.freq+1);document.getElementById('freqV').textContent=onbData.freq">+</button></div>
    <div class="counter-unit">dias por semana</div>
    <div class="onb-hint"><div class="hi">⚡</div><div class="ht">Recomendamos <b>${onbData.freq} dias por semana</b> com base no seu objetivo e perfil.</div></div>`;
  }
  else if(onbStep===7){ // tela final
    const goal=ONB_GOALS.find(g=>g.k===onbData.objetivo);
    const kcal=Math.round(onbData.peso*3.5+onbData.freq*20);
    body.innerHTML=`<div class="onb-done"><h1>Seu plano personalizado<br>está <span class="hl">pronto!</span></h1>
    <div class="stat-trio"><div class="st"><div class="v red">${onbData.freq}</div><div class="k">Treinos</div></div><div class="st"><div class="v">40-50</div><div class="k">Min</div></div><div class="st"><div class="v gold">${kcal}</div><div class="k">Kcal/treino</div></div></div>
    <div class="tech-chips" style="margin-top:24px"><span class="tech-chip"><i></i>${goal?goal.t:'Treino'}</span>${[...focusSel].slice(0,3).map(k=>`<span class="tech-chip"><i></i>${MUSCLES[k]?.nome||k}</span>`).join('')}</div></div>`;
  }
}
function drawRuler(id,val,min,max){const el=document.getElementById(id);if(!el)return;el.innerHTML='';for(let v=val-12;v<=val+12;v++){const big=v%5===0;const t=document.createElement('div');t.style.cssText=`width:7px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px`;t.innerHTML=`<div style="width:2px;height:${big?28:16}px;background:${v===val?'var(--red)':(big?'var(--text3)':'var(--border)')};border-radius:2px"></div>${big&&v>=min&&v<=max?`<span style="font-size:.7rem;color:var(--text3)">${v}</span>`:''}`;el.appendChild(t);}}
function miniBodyOnb(keys){const on=new Set(keys||[]);const a=k=>on.has(k)?'#FF2D3A':'#2c2c36';
  return `<svg viewBox="0 0 60 116"><ellipse cx="30" cy="11" rx="7" ry="8" fill="#1b1b22"/><rect x="27" y="18" width="6" height="5" fill="#1b1b22"/><path d="M16 24 Q30 19 44 24 L46 56 Q30 62 14 56 Z" fill="#1b1b22"/><path d="M14 25 L7 30 Q5 32 6 40 L11 58 L16 56 L17 30 Z" fill="#1b1b22"/><path d="M46 25 L53 30 Q55 32 54 40 L49 58 L44 56 L43 30 Z" fill="#1b1b22"/><path d="M16 57 L13 86 L25 88 L28 60 Z" fill="#1b1b22"/><path d="M44 57 L47 86 L35 88 L32 60 Z" fill="#1b1b22"/><path d="M14 87 L12 112 L22 113 L25 89 Z" fill="#1b1b22"/><path d="M46 87 L48 112 L38 113 L35 89 Z" fill="#1b1b22"/>
  <path d="M19 27 Q30 24 41 27 L40 40 Q30 45 20 40 Z" fill="${a('peito')}"/><path d="M22 42 Q30 46 38 42 L37 57 Q30 61 23 57 Z" fill="${a('abdomen')}"/>
  <path d="M15 25 Q9 27 11 35 L19 31 L19 26 Z" fill="${a('ombros')}"/><path d="M45 25 Q51 27 49 35 L41 31 L41 26 Z" fill="${a('ombros')}"/>
  <path d="M13 31 L9 47 L14 49 L17 33 Z" fill="${a('biceps')}"/><path d="M47 31 L51 47 L46 49 L43 33 Z" fill="${a('biceps')}"/>
  <path d="M18 58 Q30 64 42 58 L41 70 Q30 75 19 70 Z" fill="${a('gluteos')}"/>
  <path d="M18 60 L15 84 L26 86 L28 62 Z" fill="${a('quadriceps')}"/><path d="M42 60 L45 84 L34 86 L32 62 Z" fill="${a('quadriceps')}"/>
  <path d="M16 88 L14 110 L23 111 L25 89 Z" fill="${a('panturrilha')}"/><path d="M44 88 L46 110 L37 111 L35 89 Z" fill="${a('panturrilha')}"/></svg>`;
}

/* ── GRADE DE FOCO MUSCULAR (reutilizável) ── */
const FOCUS_GRID=[['peito','Peito'],['costas','Costas'],['ombros','Ombros'],['biceps','Bíceps'],['triceps','Tríceps'],['quadriceps','Quadríceps'],['gluteos','Glúteos'],['posterior','Posteriores'],['abdomen','Abdômen'],['antebraco','Antebraços'],['lombar','Lombar'],['panturrilha','Panturrilhas']];
let focusSel=new Set(['peito']);
function muscleGridHTML(){
  const corpoInteiro=focusSel.size===FOCUS_GRID.length;
  return `<div class="focus-head"><span class="fh-label">Foco muscular</span><div class="fh-right"><span>Corpo inteiro</span><div class="fh-toggle ${corpoInteiro?'on':''}" onclick="toggleCorpoInteiro()"></div></div></div>
  <div class="mgrid">${FOCUS_GRID.map(([k,t])=>`<div class="mgrid-card ${focusSel.has(k)?'sel':''}" onclick="toggleFocus('${k}')">${miniBodyOnb([k])}<div class="mg-name">${t}</div></div>`).join('')}</div>`;
}
function toggleFocus(k){if(focusSel.has(k)){if(focusSel.size>1)focusSel.delete(k);}else focusSel.add(k);refreshFocusGrid();}
function toggleCorpoInteiro(){if(focusSel.size===FOCUS_GRID.length){focusSel=new Set(['peito']);}else{focusSel=new Set(FOCUS_GRID.map(f=>f[0]));}refreshFocusGrid();}
function refreshFocusGrid(){const c=document.getElementById('focusGridHost');if(c)c.innerHTML=muscleGridHTML();}

/* ── PÁGINA TREINO RÁPIDO ── */
function renderFocoRapido(pg){
  const h=document.createElement('div');h.className='section-head';h.innerHTML=`<div class="heading" style="font-size:1.9rem">Treino <span style="color:var(--red2)">Rápido</span></div><div class="sub" style="color:var(--text3);font-size:.92rem;margin:4px 0 18px">Escolha os músculos e geramos um treino na hora.</div>`;pg.appendChild(h);
  const host=document.createElement('div');host.id='focusGridHost';host.innerHTML=muscleGridHTML();pg.appendChild(host);
  const bar=document.createElement('div');bar.style.cssText='position:sticky;bottom:calc(var(--tab-h) + var(--safe-b) + 8px);padding-top:14px;background:linear-gradient(0deg,var(--bg) 60%,transparent)';
  bar.innerHTML=`<button class="btn primary full glow" onclick="gerarTreinoRapido()">CRIAR TREINO RÁPIDO</button>`;
  pg.appendChild(bar);
}
function gerarTreinoRapido(){
  const keys=[...focusSel];if(!keys.length)return toast('Selecione ao menos 1 músculo');
  const exs=[];
  keys.forEach(mk=>{const lib=LIBRARY[mk]||[];lib.slice(0,2).forEach(name=>{exs.push({id:uid(),name,targetReps:10,rest:90,muscles:[mk],sets:Array.from({length:4},()=>({weight:'',reps:''})),lastSets:null,lastVolume:0});});});
  if(!exs.length)return toast('Sem exercícios para esses músculos');
  const nome='Treino Rápido · '+keys.slice(0,3).map(k=>MUSCLES[k]?.nome||k).join(', ')+(keys.length>3?'…':'');
  const w={id:uid(),name:nome,exercises:exs,lastDate:null,photo:null,_open:true};
  D.workouts.unshift(w);currentTodayWid=w.id;save();
  toast('Treino rápido gerado! 💪');
  go('treino','atual');
}

function finishOnboarding(){
  onbData.foco=[...focusSel];
  D.settings.profile=Object.assign({},onbData,{done:true});
  if(onbData.genero==='feminino')D.settings.user=D.settings.user==='Atleta'?'Atleta':D.settings.user;
  const goal=ONB_GOALS.find(g=>g.k===onbData.objetivo);if(goal)D.settings.objetivo=goal.t;
  save();
  document.getElementById('onb').classList.remove('show');
  toast('Plano pronto! Bons treinos 💪');
  go('treino','inicio');
}

applyTheme();go('treino','inicio');
if(!D.settings.profile||!D.settings.profile.done){startOnboarding();}

</script>
</body>
